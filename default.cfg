; Storage Guard — defaults (merged by Unraid when keys missing)
; Live settings: /boot/config/plugins/StorageGuard/StorageGuard.cfg
;
; Product defaults (also enforced in Settings UI until sg_defaults=1 is saved):
;   Array Warning  = largest data disk (chosen in UI; not stored here — size is machine-specific)
;   Array Critical = None
;   Pool Warning/Critical = None (never auto largest pool disk)
;   Alerts = Array Warning only; Array Critical off; all pool alerts off

sg_defaults=""
array_coloring="yes"
pool_coloring="yes"
array_color_style="outline"
outline_pulse="no"
outline_show_ok="no"
array_critical=""
array_use_custom="no"
array_warning_custom=""
array_critical_custom=""
pools_to_color="all"
alerts_array_warning="yes"
alerts_array_critical="no"
btrfs_hints_enabled="yes"
