; Storage Guard — defaults
; Live settings: /boot/config/plugins/StorageGuard/StorageGuard.cfg
;
; First-run intent:
;   Array Warning  = largest data disk (set dynamically by Settings / get-config when unset)
;   Array Critical = None
;   Pool Warning/Critical = None (no auto pool thresholds)
;   Alerts = Array Warning only

; Main coloring on/off
array_coloring="yes"
pool_coloring="yes"

; Highlight style: solid (default) | outline
; Per pool: pool_<name>_color_style  |  legacy fallback: color_style
array_color_style="solid"

; Outline-only options (ignored when style is solid)
outline_pulse="no"
outline_show_ok="no"

; Array free-space thresholds
; array_warning is intentionally omitted here — UI/runtime default = largest data disk
; Empty array_warning in live cfg means user chose None
array_critical=""
array_use_custom="no"
array_warning_custom=""
array_critical_custom=""

; Pools to color on Main: "all" or comma-separated names
pools_to_color="all"

; Per pool (written by Settings; default thresholds = None):
;   pool_<name>_warning / pool_<name>_critical  (omit or empty = None)
;   pool_<name>_use_custom / pool_<name>_warning_custom / pool_<name>_critical_custom
;   pool_<name>_color_style

; Alerts — only Array Warning on by default; all other notifications off
alerts_array_warning="yes"
alerts_array_critical="no"
; alerts_pool_<name>_warning / alerts_pool_<name>_critical default no when unset

btrfs_hints_enabled="yes"
