; Storage Guard default configuration
;
; Purpose: free-space thresholds so you know before a drive fails whether
; you still have room to migrate/rebalance without immediate replacement.
; User changes: /boot/config/plugins/StorageGuard/StorageGuard.cfg

; Main-tab coloring
array_coloring="yes"
pool_coloring="yes"

; Array thresholds
array_warning="8T"
array_critical="2T"
array_use_custom="no"
array_warning_custom=""
array_critical_custom=""

; Pools to color: "all" or comma-separated pool names
pools_to_color="all"

; Per-pool thresholds (dynamic): pool_<name>_warning / pool_<name>_critical

; Alerts — per target + severity (no master switch)
; yes = notify when free space hits that threshold for that target
alerts_array_warning="yes"
alerts_array_critical="yes"
; alerts_pool_<name>_warning="yes"
; alerts_pool_<name>_critical="yes"

btrfs_hints_enabled="yes"
