; Storage Guard — defaults
; Live settings: /boot/config/plugins/StorageGuard/StorageGuard.cfg

; Main coloring on/off
array_coloring="yes"
pool_coloring="yes"

; Highlight style: outline | solid  (per pool: pool_<name>_color_style)
; Legacy fallback: color_style
array_color_style="outline"

; Array free-space thresholds (empty = None)
array_warning=""
array_critical=""
array_use_custom="no"
array_warning_custom=""
array_critical_custom=""

; Pools to color on Main: "all" or comma-separated names
pools_to_color="all"

; Per pool (written by Settings):
;   pool_<name>_warning / pool_<name>_critical
;   pool_<name>_use_custom / pool_<name>_warning_custom / pool_<name>_critical_custom
;   pool_<name>_color_style

; Alerts: yes = notify when free space hits that level
alerts_array_warning="yes"
alerts_array_critical="yes"
; alerts_pool_<name>_warning / alerts_pool_<name>_critical

btrfs_hints_enabled="yes"
