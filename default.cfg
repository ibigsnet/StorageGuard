; StorageGuard default configuration
; These are the shipped defaults. User changes go to /boot/config/plugins/storageguard/storageguard.cfg

; Master enables
array_coloring="yes"
pool_coloring="yes"

; Array thresholds (human strings like 26T, 8T, 2T or custom)
array_warning="8T"
array_critical="2T"
array_use_custom="no"
array_warning_custom=""
array_critical_custom=""

; Pools
; Comma or space separated list of pool names to color/monitor, or "all"
pools_to_color="all"

; Per-pool thresholds will be stored as pool_<sanitizedname>_warning etc.
; Example for a pool named "intelligence":
; pool_intelligence_warning="2T"
; pool_intelligence_critical="1T"
; Similar for others. Dynamically generated in UI.

; Alerts
alerts_enabled="yes"
; Comma separated or "all": array, pool names
alerts_for="all"

; Future: btrfs specific, advanced options
btrfs_hints_enabled="yes"
