; Storage Guard — defaults (used by Unraid update.php when Default is pressed)
; Live settings: /boot/config/plugins/StorageGuard/StorageGuard.cfg
;
; Product defaults:
;   Array Warning  = largest data disk (machine-specific — set by sg-update.php on Default)
;   Array Critical = None
;   Pool coloring on Main = No (array coloring still Yes)
;   Pool Warning/Critical = None (never auto largest pool disk; forced by sg-update.php)
;   Alerts = Array Warning only; Array Critical off; all pool alerts off
;
; Dynamic pool_* / alerts_pool_* keys cannot live here (names depend on your pools).
; sg-update.php (#include) forces those to product defaults when Default is pressed.

sg_defaults=""
array_coloring="yes"
pool_coloring="no"
array_color_style="outline"
outline_pulse="no"
outline_show_ok="no"
array_critical=""
array_use_custom="no"
array_warning_custom=""
array_critical_custom=""
pools_to_color="all"
alerts_array_warning="yes"
alerts_array_critical="no"
btrfs_hints_enabled="yes"
